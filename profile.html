<!DOCTYPE html>
<html lang="pt-BR">
<head>

<style>
  body { background:#050505; }
  #profileWrap { max-width:1100px; margin:0 auto; padding:0 0 60px; }
  .profile-banner { height:320px; background:linear-gradient(135deg,#121212,#000); overflow:hidden; width:100%; position:relative; }
  .profile-banner img, .profile-banner video { width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0; }
  .profile-banner::after { content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to bottom,transparent,#050505);pointer-events:none; }
  .profile-header { display:flex;flex-direction:row;align-items:center;background:rgba(22,22,22,0.85);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,0.1);border-radius:24px;padding:40px;gap:35px;margin:-100px 20px 0;box-shadow:0 25px 50px rgba(0,0,0,0.6);position:relative;z-index:10; }
  .profile-av { width:160px;height:160px;border-radius:40px;border:6px solid #161616;font-size:3rem;background:#7c6af7;color:#fff;font-weight:800;display:flex;align-items:center;justify-content:center;overflow:hidden;flex-shrink:0;transition:transform .3s; }
  .profile-av:hover { transform:scale(1.05) rotate(-2deg); }
  .profile-av img { width:100%;height:100%;object-fit:cover; }
  .profile-info { flex-grow:1; }
  .profile-name-row { display:flex;align-items:center;gap:15px;margin-bottom:12px;flex-wrap:wrap; }
  .profile-name { font-size:2.8rem;font-weight:950;margin:0;line-height:1;letter-spacing:-1px; }
  .profile-bio { color:#888;font-size:1.1rem;margin-bottom:25px;max-width:650px;line-height:1.6; }
  .profile-stats-row { display:flex;gap:30px; }
  .pstat { display:flex;flex-direction:column; }
  .pstat span { font-size:1.5rem;font-weight:900;color:#fff; }
  .pstat small { color:#444;text-transform:uppercase;font-size:.7rem;font-weight:800;letter-spacing:1px; }
  .badges-row { display:flex;gap:10px;margin-bottom:15px;flex-wrap:wrap; }
  .badge-item { display:flex;align-items:center;justify-content:center;width:28px;height:28px; }
  .btn-edit-profile { background:rgba(124,106,247,.1);border:1px solid rgba(255,255,255,.1);color:#fff;display:flex;align-items:center;gap:8px;padding:12px 20px;border-radius:12px;height:fit-content;font-weight:700;cursor:pointer; }
  .btn-edit-profile:hover { background:#7c6af7; }
  .profile-scripts { margin-top:50px;padding:0 20px; }
  .profile-scripts .script-grid { display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:20px; }
  .uid-tag { background:#1a1a1a;border:1px solid #333;color:#666;padding:4px 10px;border-radius:6px;font-size:.75rem;font-family:monospace; }
  /* Music Player */
  #musicPlayer { position:fixed;bottom:24px;right:24px;z-index:999;background:rgba(15,15,15,.92);backdrop-filter:blur(20px);border:1px solid rgba(124,106,247,.3);border-radius:18px;padding:12px 16px;display:flex;align-items:center;gap:12px;box-shadow:0 8px 32px rgba(0,0,0,.5);min-width:220px; }
  .mp-art { width:40px;height:40px;border-radius:10px;background:linear-gradient(135deg,#7c6af7,#a855f7);display:flex;align-items:center;justify-content:center;font-size:1.1rem;flex-shrink:0;overflow:hidden; }
  .mp-art img { width:100%;height:100%;object-fit:cover; }
  .mp-info { flex:1;min-width:0; }
  .mp-name { font-size:.78rem;font-weight:700;color:#fff;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:110px; }
  .mp-bar-wrap { width:100%;height:3px;background:rgba(255,255,255,.1);border-radius:2px;margin-top:5px;cursor:pointer; }
  .mp-bar-fill { height:100%;background:#7c6af7;border-radius:2px;width:0%;transition:width .3s linear; }
  .mp-controls { display:flex;align-items:center;gap:8px; }
  .mp-btn { background:none;border:none;color:#aaa;cursor:pointer;font-size:1rem;padding:4px; }
  .mp-btn:hover { color:#fff; }
  .mp-btn.active { color:#7c6af7; }
  .mp-vol { width:60px;height:3px;accent-color:#7c6af7;cursor:pointer; }
  .mp-eq { display:flex;align-items:flex-end;gap:2px;height:16px; }
  .mp-eq span { width:3px;background:#7c6af7;border-radius:2px;animation:eq .8s ease-in-out infinite alternate; }
  .mp-eq span:nth-child(2){animation-delay:.2s}.mp-eq span:nth-child(3){animation-delay:.4s}
  .mp-eq.paused span { animation-play-state:paused; }
  @keyframes eq { from{height:4px} to{height:14px} }
  @media(max-width:800px){.profile-header{flex-direction:column;align-items:center;text-align:center;gap:20px;padding:30px}.profile-stats-row{justify-content:center}.profile-name-row{justify-content:center}}
</style>
</head>
<body>
<div id="profileBgFixed" class="profile-bg-fixed"></div>
<canvas id="particles"></canvas>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="./"><div class="logo-glow">⚡</div><span>I'mScripts<span class="acc">System</span></span></a>
    <div class="nav-links">
      <a href="./" class="nl"><i class="fas fa-home"></i> Home</a>
      <a href="./#scripts" class="nl"><i class="fas fa-code"></i> Scripts</a>
    </div>
    <div class="nav-right">
      <div id="nav-guest" class="nav-auth">
        <a href="login" class="btn-ghost-sm">Entrar</a>
        <a href="register" class="btn-primary-sm">Registrar</a>
      </div>
      <div id="nav-logged" class="nav-user-area" style="display:none">
        <button class="btn-admin-nav" id="navAdminBtn" onclick="location.href='settings'" style="display:none"><i class="fas fa-crown"></i> Admin</button>
        <button class="btn-post-nav" onclick="window.location='./'"><i class="fas fa-plus"></i> Postar</button>
        <div class="notif-wrap" id="notifWrap">
          <button class="notif-btn" id="notifBtn"><i class="fas fa-bell"></i><span class="notif-badge" id="notifBadge" style="display:none"></span></button>
          <div class="notif-panel" id="notifPanel"></div>
        </div>
        <div class="nav-avatar-wrap" id="navAvatarWrap">
          <div class="nav-avatar" id="navAvatar"></div>
          <span id="navName"></span>
          <i class="fas fa-chevron-down nav-chev"></i>
          <div class="nav-dropdown" id="navDropdown">
            <a id="navProfileLink" href="profile"><i class="fas fa-user"></i> Meu Perfil</a>
            <a href="settings"><i class="fas fa-cog"></i> Configurações</a>
            <div class="dd-divider"></div>
            <a onclick="logout()" style="color:#ff6b6b;cursor:pointer"><i class="fas fa-sign-out-alt"></i> Sair</a>
          </div>

      </div>

  </div>
</nav>

<div id="profileWrap"><div style="text-align:center;padding:100px;color:#555"><i class="fas fa-spinner fa-spin" style="font-size:2rem"></i></div></div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal-box animate-scale" style="max-width:520px">
    <div class="modal-head">
      <h3><i class="fas fa-paint-brush"></i> Editar Perfil</h3>
      <button class="modal-x" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="fg"><label>Bio</label><input id="editBio" placeholder="Fale sobre você..."/></div>
      <div class="fg"><label>URL do Avatar</label><input id="editAvatarURL" placeholder="https://..."/></div>
      <div class="fg"><label>URL do Banner</label><input id="editBanner" placeholder="https://..."/></div>
      <div class="fg"><label>Cor do Avatar</label>
        <div class="color-row">
          <input type="color" id="editColor" value="#7c6af7" class="color-pick"/>
          <div class="color-presets">
            <span class="cp" style="background:#7c6af7" onclick="setColor('#7c6af7')"></span>
            <span class="cp" style="background:#ff6b35" onclick="setColor('#ff6b35')"></span>
            <span class="cp" style="background:#00d4aa" onclick="setColor('#00d4aa')"></span>
            <span class="cp" style="background:#ff4757" onclick="setColor('#ff4757')"></span>
            <span class="cp" style="background:#ffd700" onclick="setColor('#ffd700')"></span>
            <span class="cp" style="background:#1e90ff" onclick="setColor('#1e90ff')"></span>
          </div>
        </div>
      </div>
      <div class="fg"><label>Cor do Nome</label>
        <div class="color-row">
          <input type="color" id="editNameColor" value="#ffffff" class="color-pick"/>
          <div class="color-presets">
            <span class="cp" style="background:#ffffff" onclick="setNameColor('#ffffff')"></span>
            <span class="cp" style="background:#7c6af7" onclick="setNameColor('#7c6af7')"></span>
            <span class="cp" style="background:#ff6b35" onclick="setNameColor('#ff6b35')"></span>
            <span class="cp" style="background:#00d4aa" onclick="setNameColor('#00d4aa')"></span>
            <span class="cp" style="background:#ffd700" onclick="setNameColor('#ffd700')"></span>
          </div>
        </div>
      </div>
      <button class="btn-submit" onclick="saveProfile()"><i class="fas fa-save"></i> Salvar</button>
    </div>
  </div>
</div>

<!-- Music Player -->
<div id="musicPlayer" style="display:none">
  <div class="mp-art" id="mpArt"><i class="fas fa-music"></i></div>
  <div class="mp-info">
    <div class="mp-name" id="mpName">Música do Perfil</div>
    <div class="mp-bar-wrap" id="mpBarWrap"><div class="mp-bar-fill" id="mpBarFill"></div></div>
  </div>
  <div class="mp-controls">
    <div class="mp-eq" id="mpEq"><span></span><span></span><span></span></div>
    <button class="mp-btn" id="mpPlayBtn" onclick="toggleMusic()"><i class="fas fa-pause"></i></button>
    <button class="mp-btn" id="mpMuteBtn" onclick="toggleMute()"><i class="fas fa-volume-up"></i></button>
    <input type="range" class="mp-vol" id="mpVol" min="0" max="1" step="0.05" value="0.7" oninput="setVolume(this.value)">
  </div>
</div>
<audio id="profileAudio" loop></audio>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">⚡ I'mScripts<span class="acc">System</span></div>
    <p>© 2025 I'mScripts System</p>
  </div>
</footer>

<script src="app.js"></script>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function setColor(c){document.getElementById('editColor').value=c;}
function setNameColor(c){document.getElementById('editNameColor').value=c;}
function openEditModal(){
  if(!_currentUser)return;
  document.getElementById('editBio').value=_currentUser.bio||'';
  document.getElementById('editAvatarURL').value=_currentUser.avatarURL||'';
  document.getElementById('editBanner').value=_currentUser.banner||'';
  document.getElementById('editColor').value=_currentUser.avatarColor||'#7c6af7';
  document.getElementById('editNameColor').value=_currentUser.nameColor||'#ffffff';
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal(){document.getElementById('editModal').classList.remove('open');}

async function saveProfile(){
  if(!_currentUser)return;
  const updates={
    bio:document.getElementById('editBio').value.trim(),
    avatarURL:document.getElementById('editAvatarURL').value.trim(),
    banner:document.getElementById('editBanner').value.trim(),
    avatarColor:document.getElementById('editColor').value,
    nameColor:document.getElementById('editNameColor').value,
  };
  await DB.update(`users/${getUID()}`,updates);
  Object.assign(_currentUser,updates);
  localStorage.setItem('sd_user',JSON.stringify(_currentUser));
  closeEditModal();
  renderProfile();
  showNotification('Perfil atualizado!');
}

async function renderProfile(){
  const params=new URLSearchParams(location.search);
  let targetUser=params.get('user');
  const wrap=document.getElementById('profileWrap');

  // Se não tem ?user= na URL, espera o auth e usa o usuário logado
  if(!targetUser){
    let tries=0;
    while(!_currentUser && tries<40){await new Promise(r=>setTimeout(r,100));tries++;}
    if(!_currentUser){
      wrap.innerHTML='<div class="sp-err"><h2>Faça login para ver seu perfil</h2><a href="login" class="btn-hero-primary">Entrar</a></div>';
      return;
    }
    targetUser=_currentUser.username;
    // Atualiza URL sem recarregar
    history.replaceState(null,'',`profile?user=${encodeURIComponent(targetUser)}`);
  }

  // Busca dados do usuário no Firebase
  const uid=await DB.get(`usernames/${targetUser.toLowerCase()}`);
  if(!uid){wrap.innerHTML='<div class="sp-err"><h2>Usuário não encontrado</h2><a href="./" class="btn-hero-primary">Voltar</a></div>';return;}
  const user=await DB.get(`users/${uid}`);
  if(!user){wrap.innerHTML='<div class="sp-err"><h2>Usuário não encontrado</h2><a href="./" class="btn-hero-primary">Voltar</a></div>';return;}

  const isOwn=_currentUser?.username===targetUser;
  const postsData=await DB.get('posts')||{};
  const userPosts=Object.values(postsData).filter(p=>p.author===targetUser).sort((a,b)=>b.ts-a.ts);
  const totalViews=userPosts.reduce((a,p)=>a+(p.views||0),0);

  document.title=`${targetUser} — ScriptDrop`;

  const banner=user.banner||'';
  const isVideo=banner.startsWith('data:video')||banner.endsWith('.mp4')||banner.endsWith('.webm');
  const bannerInner=banner?(isVideo?`<video src='${banner}' autoplay loop muted playsinline style='width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0'></video>`:`<img src='${banner}' style='width:100%;height:100%;object-fit:cover;position:absolute;top:0;left:0'>`):'';

  // Badges
  let badgesHtml='<div class="badges-row">';
  if(user.id==='937937001112555531')badgesHtml+=`<div class="badge-item" title="Owner">⚡</div>`;
  if(user.isVerified)badgesHtml+=`<div class="badge-item" title="Verificado"><img src='https://i.ibb.co/1Yr4JzCM/i-removebg-preview.png' style='width:22px;height:22px;object-fit:contain'></div>`;
  (user.badges||[]).forEach(b=>{
    const isImg=b.icon&&(b.icon.startsWith('data:')||b.icon.startsWith('http'));
    badgesHtml+=`<div class="badge-item" title="${esc(b.desc)}">${isImg?`<img src='${b.icon}' style='width:24px;height:24px;object-fit:cover;border-radius:4px'>`:b.icon}</div>`;
  });
  badgesHtml+='</div>';

  const avContent=user.avatarURL?`<img src='${user.avatarURL}' style='width:100%;height:100%;object-fit:cover'>`:targetUser.charAt(0).toUpperCase();

  // Follow
  const isFollowing=(_currentUser?.following||[]).includes(targetUser);
  const followBtn=!isOwn&&_currentUser?`<button class="btn-follow ${isFollowing?'following':''}" onclick="toggleFollow('${targetUser}')" style="margin-top:15px">${isFollowing?'✓ Seguindo':'+ Seguir'}</button>`:'';

  // Banner no fundo inteiro da página
  const bgDiv = document.getElementById('profileBgFixed');
  if (bgDiv && banner) {
    if (isVideo) bgDiv.innerHTML = `<video src='${banner}' autoplay loop muted playsinline></video>`;
    else bgDiv.style.backgroundImage = `url('${banner}')`;
  }

  wrap.innerHTML=`
  <div class="profile-banner">${bannerInner}</div>
  <div class="profile-header">
    <div class="profile-av-wrap">
      <div class="profile-av" style="background:${user.avatarColor||'#7c6af7'}">${avContent}</div>
    </div>
    <div class="profile-info">
      <div class="profile-name-row">
        <h1 class="profile-name" style="color:${user.nameColor||'#fff'}">${esc(targetUser)}</h1>
        <div class="uid-tag">#${(user.id||uid).slice(0,8)}</div>
      </div>
      ${badgesHtml}
      <p class="profile-bio">${esc(user.bio||'Sem bio ainda.')}</p>
      <div class="profile-stats-row">
        <div class="pstat"><span>${userPosts.length}</span><small>Scripts</small></div>
        <div class="pstat"><span>${totalViews}</span><small>Views</small></div>
        <div class="pstat"><span>${(user.following||[]).length}</span><small>Seguindo</small></div>
      </div>
      ${followBtn}
    </div>
    ${isOwn?`<button class="btn-edit-profile" onclick="openEditModal()"><i class="fas fa-paint-brush"></i> Editar</button>`:''}
  </div>
  <div class="profile-scripts">
    <h2 class="feed-title"><i class="fas fa-code" style="color:#7c6af7"></i> Scripts de ${esc(targetUser)}</h2>
    <div class="script-grid" id="profileGrid"></div>
  </div>`;

  const grid=document.getElementById('profileGrid');
  if(!userPosts.length){grid.innerHTML='<p style="color:#555">Nenhum script publicado ainda.</p>';}
  else{grid.innerHTML=userPosts.map(p=>buildCard(p,isOwn)).join('');}

  initMusic(user);
}

function buildCard(p, isOwn){
  const tags = (p.tags||[]).slice(0,3).map(t=>`<span class="tag-chip">${esc(t)}</span>`).join('');
  const img = p.image
    ? `<div class="pc-img"><img src="${esc(p.image)}" onerror="this.parentElement.style.display='none'"/></div>`
    : `<div class="pc-img pc-img-placeholder" style="height:120px;background:#0a0a0a;display:flex;align-items:center;justify-content:center;color:#222;font-size:2rem"><i class="fas fa-code"></i></div>`;
  return `<div class="post-card" style="position:relative;cursor:pointer" onclick="location.href='script?id=${p.id}'">
    ${isOwn ? `<button class="btn-delete-script" onclick="event.stopPropagation();deletePost('${p.id}')"><i class="fas fa-trash"></i></button>` : ''}
    <div class="pc-top">
      <span class="pc-time"><i class="fas fa-clock" style="font-size:.65rem"></i> ${p.date||''}</span>
      <span style="color:#7c6af7;font-size:.75rem"><i class="fas fa-eye"></i> ${p.views||0}</span>
    </div>
    ${img}
    <div class="pc-bottom">
      <div class="pc-title">${esc(p.title)}</div>
      <div class="pc-game"><i class="fas fa-gamepad"></i> ${esc(p.game||'Universal')}</div>
      <div style="display:flex;flex-wrap:wrap;gap:4px;margin-top:8px">${tags}</div>
    </div>
  </div>`;
}

// Music Player
const audio=document.getElementById('profileAudio');
function initMusic(user){
  if(!user.profileMusic)return;
  document.getElementById('musicPlayer').style.display='flex';
  if(user.avatarURL)document.getElementById('mpArt').innerHTML=`<img src='${user.avatarURL}'>`;
  document.getElementById('mpName').textContent=user.username+' — música';
  audio.src=user.profileMusic;audio.volume=0.7;
  audio.play().catch(()=>{document.getElementById('mpPlayBtn').innerHTML='<i class="fas fa-play"></i>';document.getElementById('mpEq').classList.add('paused');});
  audio.addEventListener('timeupdate',()=>{if(audio.duration)document.getElementById('mpBarFill').style.width=(audio.currentTime/audio.duration*100)+'%';});
  document.getElementById('mpBarWrap').addEventListener('click',e=>{const r=e.currentTarget.getBoundingClientRect();audio.currentTime=((e.clientX-r.left)/r.width)*audio.duration;});
}
function toggleMusic(){const b=document.getElementById('mpPlayBtn'),e=document.getElementById('mpEq');if(audio.paused){audio.play();b.innerHTML='<i class="fas fa-pause"></i>';e.classList.remove('paused');}else{audio.pause();b.innerHTML='<i class="fas fa-play"></i>';e.classList.add('paused');}}
function toggleMute(){audio.muted=!audio.muted;document.getElementById('mpMuteBtn').innerHTML=audio.muted?'<i class="fas fa-volume-mute"></i>':'<i class="fas fa-volume-up"></i>';}
function setVolume(v){audio.volume=v;audio.muted=false;}

// Roda quando Firebase confirma auth
auth.onAuthStateChanged(()=>{
  // Atualiza link do perfil na navbar
  if(_currentUser){
    const lnk=document.getElementById('navProfileLink');
    if(lnk)lnk.href=`profile?user=${encodeURIComponent(_currentUser.username)}`;
  }
  renderProfile();
});
</script>
</body>
</html>
