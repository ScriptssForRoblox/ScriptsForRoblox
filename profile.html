<!DOCTYPE html>
<html lang="pt-BR Eng">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Perfil — ScriptDrop</title>

<!-- Open Graph / Discord Rich Embed -->
<meta property="og:type" content="profile">
<meta property="og:site_name" content="ScriptDrop">
<meta property="og:title" content="Ver Perfil no ScriptDrop">
<meta property="og:description" content="Confira os scripts e conquistas deste usuário na comunidade ScriptDrop.">
<meta property="og:image" content="https://raw.githubusercontent.com/PKHHonors/ScriptDrop/main/preview-banner.png">
<meta name="theme-color" content="#7c6af7">
<meta name="twitter:card" content="summary">

<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<style>
  :root {
    --glass: rgba(22, 22, 22, 0.8);
    --border: rgba(255, 255, 255, 0.1);
    --primary: #7c6af7;
  }
  
  body { background: #050505; }

  #profileWrap {
    animation: fadeUp 0.8s ease;
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 0 60px 0;
  }

  .profile-banner {
    height: 320px !important;
    background: linear-gradient(135deg, #121212, #000);
    border-bottom: 1px solid var(--border);
    overflow: hidden;
    width: 100%;
    background-size: cover !important;
    background-position: center !important;
  }

  .profile-header {
    display: flex;
    flex-direction: row;
    align-items: center;
    background: var(--glass);
    backdrop-filter: blur(20px);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 40px;
    gap: 35px;
    margin: -100px 20px 0 20px;
    box-shadow: 0 25px 50px rgba(0,0,0,0.6);
    position: relative;
    z-index: 10;
  }

  .profile-av-wrap { flex-shrink: 0; }

  .profile-av {
    width: 160px !important;
    height: 160px !important;
    border-radius: 40px !important;
    border: 6px solid #161616 !important;
    font-size: 3rem !important;
    background: var(--primary);
    color: #fff;
    font-weight: 800;
    box-shadow: 0 10px 20px rgba(0,0,0,0.3);
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
    flex-shrink: 0;
    transition: transform 0.3s ease;
  }
  .profile-av:hover { transform: scale(1.05) rotate(-2deg); }
  .profile-av img { width: 100%; height: 100%; object-fit: cover; }

  .profile-info { flex-grow: 1; }
  
  .profile-name-row { 
    display: flex; 
    align-items: center; 
    gap: 15px; 
    margin-bottom: 12px;
    flex-wrap: wrap;
  }
  
  .profile-name { font-size: 2.8rem; font-weight: 950; margin: 0; line-height: 1; letter-spacing: -1px; }
  .profile-badge { background: linear-gradient(135deg, var(--primary), #a855f7); color: #fff; padding: 6px 14px; border-radius: 8px; font-size: 0.8rem; font-weight: 800; text-transform: uppercase; letter-spacing: 0.5px; box-shadow: 0 4px 15px rgba(124, 106, 247, 0.3); }
  
  .profile-bio { color: #888; font-size: 1.1rem; margin-bottom: 25px; max-width: 650px; line-height: 1.6; }

  .profile-stats-row { display: flex; gap: 30px; }
  .pstat { display: flex; flex-direction: column; align-items: flex-start; }
  .pstat span { font-size: 1.5rem; font-weight: 900; color: #fff; line-height: 1.2; }
  .pstat small { color: #444; text-transform: uppercase; font-size: 0.7rem; font-weight: 800; letter-spacing: 1px; }

  .btn-edit-profile {
    background: rgba(124, 106, 247, 0.1);
    border: 1px solid var(--border);
    color: #fff;
    display: flex; align-items: center; gap: 8px;
    padding: 12px 20px;
    border-radius: 12px;
    height: fit-content;
    font-weight: 700;
  }
  .btn-edit-profile:hover { background: var(--primary); transform: translateY(-3px); }

  /* Discord Badge & Tooltip */
  .discord-badge { 
    background: #5865F2; 
    color: #fff; 
    padding: 6px 12px; 
    border-radius: 8px; 
    font-size: 0.8rem; 
    font-weight: 800; 
    display: flex; 
    align-items: center; 
    gap: 8px; 
    cursor: help;
    position: relative;
  }
  .discord-badge::after {
    content: "Badge ganha ao conectar sua conta com o Bot oficial do ScriptDrop!";
    position: absolute; bottom: 125%; left: 50%; transform: translateX(-50%);
    background: #111; color: #fff; padding: 10px; border-radius: 8px; font-size: 0.7rem;
    width: 180px; text-align: center; opacity: 0; visibility: hidden; transition: 0.3s; z-index: 100; border: 1px solid var(--border);
  }
  .discord-badge:hover::after { opacity: 1; visibility: visible; }

  /* Discord Card abaixo da Bio */
  .discord-info-card {
    display: flex; align-items: center; gap: 12px;
    background: rgba(88, 101, 242, 0.1);
    border: 1px solid rgba(88, 101, 242, 0.2);
    padding: 8px 16px; border-radius: 50px;
    width: fit-content; margin-top: 15px;
    animation: fadeIn 0.5s ease;
  }
  .discord-info-card img { width: 24px; height: 24px; border-radius: 50%; }
  .discord-info-card span { font-size: 0.9rem; font-weight: 600; color: #dee2e6; }

  .profile-scripts { margin-top: 50px; padding: 0 20px; }
  .profile-scripts .feed-title { margin-bottom: 30px; font-size: 1.8rem; }

  @media (max-width: 800px) {
    .profile-header { flex-direction: column; align-items: center; text-align: center; gap: 20px; padding: 30px; }
    .profile-stats-row { justify-content: center; gap: 40px; }
    .profile-name-row { justify-content: center; }
  }
</style>
<body>
<canvas id="particles"></canvas>

<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="./"><div class="logo-glow">⚡</div><span>Script<span class="acc">Drop</span></span></a>
    <div class="nav-links">
      <a href="./" class="nl"><i class="fas fa-home"></i> Home</a>
      <a href="./#scripts" class="nl"><i class="fas fa-code"></i> Scripts</a>
    </div>
    <div class="nav-right">
      <div id="nav-guest" class="nav-auth">
        <a href="login" class="btn-ghost-sm">Entrar</a>
        <a href="register" class="btn-primary-sm">Registrar</a>
      </div>
      <div id="nav-logged" class="nav-user-area" style="display:none">
        <button class="btn-admin-nav" id="navAdminBtn" onclick="location.href='settings'"><i class="fas fa-crown"></i> Admin</button>
        <button class="btn-post-nav" onclick="window.location='./'"><i class="fas fa-plus"></i> Postar</button>
        <div class="nav-avatar-wrap" id="navAvatarWrap">
          <div class="nav-avatar" id="navAvatar"></div>
          <span id="navName"></span>
          <i class="fas fa-chevron-down nav-chev"></i>
          <div class="nav-dropdown" id="navDropdown">
            <a href="profile"><i class="fas fa-user"></i> Meu Perfil</a>
            <a href="settings"><i class="fas fa-cog"></i> Configurações</a>
            <div class="dd-divider"></div>
            <a onclick="logout()" style="color:#ff6b6b;cursor:pointer"><i class="fas fa-sign-out-alt"></i> Sair</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<div id="profileWrap"></div>

<!-- EDIT MODAL -->
<div class="modal-bg" id="editModal">
  <div class="modal-box animate-scale" style="max-width:520px">
    <div class="modal-head">
      <h3><i class="fas fa-paint-brush"></i> Editar Perfil</h3>
      <button class="modal-x" onclick="closeEditModal()"><i class="fas fa-times"></i></button>
    </div>
    <div class="modal-body">
      <div class="fg"><label>Bio</label><input id="editBio" placeholder="Fale sobre você..."/></div>
      <div class="fg"><label>URL do Avatar</label><input id="editAvatarURL" placeholder="https://..."/></div>
      <div class="fg"><label>URL do Banner <span class="opt">(imagem de fundo)</span></label><input id="editBanner" placeholder="https://..."/></div>
      <div class="fg"><label>Cor do Avatar</label>
        <div class="color-row">
          <input type="color" id="editColor" value="#7c6af7" class="color-pick"/>
          <div class="color-presets">
            <span class="cp" style="background:#7c6af7" onclick="setColor('#7c6af7')"></span>
            <span class="cp" style="background:#ff6b35" onclick="setColor('#ff6b35')"></span>
            <span class="cp" style="background:#00d4aa" onclick="setColor('#00d4aa')"></span>
            <span class="cp" style="background:#ff4757" onclick="setColor('#ff4757')"></span>
            <span class="cp" style="background:#ffd700" onclick="setColor('#ffd700')"></span>
            <span class="cp" style="background:#1e90ff" onclick="setColor('#1e90ff')"></span>
          </div>
        </div>
      </div>
      <div class="fg"><label>Cor do Nome</label>
        <div class="color-row">
          <input type="color" id="editNameColor" value="#ffffff" class="color-pick"/>
          <div class="color-presets">
            <span class="cp" style="background:#ffffff" onclick="setNameColor('#ffffff')"></span>
            <span class="cp" style="background:#7c6af7" onclick="setNameColor('#7c6af7')"></span>
            <span class="cp" style="background:#ff6b35" onclick="setNameColor('#ff6b35')"></span>
            <span class="cp" style="background:#00d4aa" onclick="setNameColor('#00d4aa')"></span>
            <span class="cp" style="background:#ffd700" onclick="setNameColor('#ffd700')"></span>
          </div>
        </div>
      </div>
      <button class="btn-submit" onclick="saveProfile()"><i class="fas fa-save"></i> Salvar Perfil</button>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">⚡ Script<span class="acc">Drop</span></div>
    <p>© 2025 ScriptDrop</p>
  </div>
</footer>

<script src="app.js"></script>
<script>
function setColor(c){ document.getElementById('editColor').value=c; }
function setNameColor(c){ document.getElementById('editNameColor').value=c; }

function openEditModal(){
  const session = localStorage.getItem('session');
  const users = JSON.parse(localStorage.getItem('users')||'[]');
  const user = users.find(u=>u.username===session)||{};
  document.getElementById('editBio').value = user.bio||'';
  document.getElementById('editAvatarURL').value = user.avatarURL||'';
  document.getElementById('editBanner').value = user.banner||'';
  document.getElementById('editColor').value = user.avatarColor||'#7c6af7';
  document.getElementById('editNameColor').value = user.nameColor||'#ffffff';
  document.getElementById('editModal').classList.add('open');
}
function closeEditModal(){ document.getElementById('editModal').classList.remove('open'); }

function handleFile(input, targetId) {
  const file = input.files[0];
  if (!file) return;
  if (file.size > 15 * 1024 * 1024) { // Limite de 15MB
    showNotification("Arquivo muito grande! Máximo de 15MB permitido.", "error");
    input.value = "";
    return;
  }
  const reader = new FileReader();
  reader.onload = (e) => { document.getElementById(targetId).value = e.target.result; };
  reader.readAsDataURL(file);
}

function saveProfile(){
  const session = localStorage.getItem('session');
  const users = JSON.parse(localStorage.getItem('users')||'[]');
  const idx = users.findIndex(u=>u.username===session);
  if(idx===-1) return;
  users[idx].bio = document.getElementById('editBio').value.trim();
  users[idx].avatarURL = document.getElementById('editAvatarURL').value.trim();
  users[idx].banner = document.getElementById('editBanner').value.trim();
  users[idx].avatarColor = document.getElementById('editColor').value;
  users[idx].nameColor = document.getElementById('editNameColor').value;
  users[idx].profileMusic = document.getElementById('editMusic').value.trim();

  try {
    localStorage.setItem('users', JSON.stringify(users));
    closeEditModal();
    renderProfile();
    showNotification("Perfil atualizado!");
  } catch (e) {
    showNotification("Erro: O arquivo é muito pesado para o armazenamento do navegador. Tente um arquivo menor ou use uma URL.", "error");
  }
}

function renderProfile(){
  const params = new URLSearchParams(location.search);
  let targetUser = params.get('user');
  const session = localStorage.getItem('session');

  if (!targetUser) targetUser = session;

  // URL Cleaner: Transforma profile?user=alex em apenas /alex na barra de endereços
  if (targetUser && window.history.replaceState) {
    const cleanPath = window.location.pathname.replace(/profile(\.html)?$/, '');
    window.history.replaceState(null, '', cleanPath + targetUser);
  }

  const isOwn = targetUser === session;
  const users = JSON.parse(localStorage.getItem('users')||'[]');
  const user = users.find(u=>u.username===targetUser);
  const wrap = document.getElementById('profileWrap');

  if(!user){ wrap.innerHTML='<div class="sp-err"><i class="fas fa-user-slash"></i><h2>Usuário não encontrado</h2><a href="./" class="btn-hero-primary">Voltar</a></div>'; return; }

  const posts = JSON.parse(localStorage.getItem('posts')||'[]');
  const userPosts = posts.filter(p=>p.author===targetUser);
  const avatarColor = user.avatarColor||'#7c6af7';
  const nameColor = user.nameColor||'#ffffff';
  const banner = user.banner||'';
  const bio = user.bio||'Sem bio ainda.';
  const uid = user.id || 'N/A';
  const totalViews = userPosts.reduce((a,p)=>a+(p.views||0),0);

  // Define o banner (Imagem ou Vídeo) - CORREÇÃO DO ERRO
  const isVideoBanner = banner.startsWith('data:video') || banner.endsWith('.mp4') || banner.endsWith('.webm');
  const bannerHtml = isVideoBanner 
    ? `<video src="${escapeHtml(banner)}" class="profile-bg-video" autoplay loop muted playsinline></video>`
    : `<div class="profile-bg-overlay" ${banner?`style="background-image:url('${escapeHtml(banner)}')"`:''}></div>`;

  const isAlex = session === 'Alex';

  // Sistema de Badges Oficiais (Embaixo do nome)
  let badgesHtml = '<div class="badges-row">';
  if (uid === "937937001112555531") {
    badgesHtml += `<div class="badge-item" title="Owner & Founder">⚡</div>`;
  }
  if (user.discordUser) {
    badgesHtml += `<div class="badge-item" style="color:#5865F2" title="Usuário verificado pelo Discord"><i class="fab fa-discord"></i></div>`;
  }
  if (user.badges) {
    user.badges.forEach(b => {
      const isImg = b.icon && (b.icon.startsWith('data:') || b.icon.startsWith('http'));
      const iconHtml = isImg
        ? `<img src="${b.icon}" style="width:22px;height:22px;object-fit:cover;border-radius:4px;vertical-align:middle">`
        : b.icon;
      badgesHtml += `<div class="badge-item" title="${escapeHtml(b.desc)}">${iconHtml}</div>`;
    });
  }
  badgesHtml += '</div>';

  const avatarContent = user.avatarURL 
    ? `<img src="${escapeHtml(user.avatarURL)}" style="width:100%;height:100%;object-fit:cover">`
    : targetUser.charAt(0).toUpperCase();

  wrap.innerHTML = `
  <div class="profile-banner" ${banner?`style="background-image:url('${escapeHtml(banner)}');background-size:cover;background-position:center"`:''}></div>
    <div class="profile-header">
      <div class="profile-av-wrap">
        <div class="profile-av" style="background:${avatarColor}">${avatarContent}</div>
      </div>
      <div class="profile-info">
        <div class="profile-name-row">
          <h1 class="profile-name" style="color:${nameColor}">${escapeHtml(targetUser)} ${user.isVerified ? '<span style="color:#1e90ff" title="Verificado">✅</span>' : ''}</h1>
          <div class="uid-tag" title="User ID: ${uid}"><i class="fas fa-tag"></i> #${uid}</div>
        </div>
        ${badgesHtml}
        <p class="profile-bio">${escapeHtml(bio)}</p>
        <div class="profile-stats-row">
          <div class="pstat"><span>${userPosts.length}</span><small>Scripts</small></div>
          <div class="pstat"><span>${totalViews}</span><small>Views</small></div>
        </div>
      </div>
      ${isOwn?`<button class="btn-edit-profile" onclick="openEditModal()"><i class="fas fa-paint-brush"></i> Editar Perfil</button>`:''}
    </div>
    <div class="profile-scripts">
      <h2 class="feed-title"><i class="fas fa-code" style="color:var(--primary)"></i> Scripts de ${escapeHtml(targetUser)}</h2>
      <div class="script-grid" id="profileGrid"></div>
    </div>`;

  const grid = document.getElementById('profileGrid');
  if(!userPosts.length){ grid.innerHTML='<p style="color:#555">Nenhum script publicado ainda.</p>'; return; }
  grid.innerHTML = userPosts.map(p=>buildCard(p)).join('');
}

function escapeHtml(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function buildCard(p){
  const tags=(p.tags||[]).slice(0,3).map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('');
  const img=p.image?`<div class="card-img"><img src="${escapeHtml(p.image)}" onerror="this.parentElement.style.display='none'"/></div>`:'';
  
  // Verifica se o dono do perfil é o dono do script para mostrar o botão de deletar
  const session = localStorage.getItem('session');
  const params = new URLSearchParams(location.search);
  const isOwnProfile = (params.get('user') || session) === session;

  return `
  <div class="script-card">
    ${isOwnProfile ? `<button class="btn-delete-script" onclick="deletePost(${p.id})"><i class="fas fa-trash"></i></button>` : ''}
    <div onclick="location.href='script?id=${p.id}'" style="cursor:pointer">
    ${img}
    <div class="card-body">
      <div class="card-game"><i class="fas fa-gamepad"></i> ${escapeHtml(p.game||'Universal')}</div>
      <div class="card-title">${escapeHtml(p.title)}</div>
      <div class="card-tags">${tags}</div>
      <div class="card-footer">
        <span class="card-author"><i class="fas fa-user"></i> ${escapeHtml(p.author)}</span>
        <span class="card-views"><i class="fas fa-eye"></i> ${p.views||0}</span>
      </div>
    </div>
    </div>
  </div>`;
}

renderProfile();
</script>
</body>
</html>
