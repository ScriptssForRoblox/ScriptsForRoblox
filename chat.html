<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Chat — ScriptDrop</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
  .chat-wrap { max-width:900px; margin:100px auto 60px; padding:0 20px; display:flex; gap:20px; height:calc(100vh - 160px); }
  .chat-list { width:260px; flex-shrink:0; background:#111; border:1px solid #222; border-radius:16px; overflow-y:auto; }
  .chat-list-title { padding:16px 20px; font-weight:800; font-size:.9rem; color:#888; border-bottom:1px solid #222; }
  .chat-user-item { display:flex; align-items:center; gap:12px; padding:14px 16px; cursor:pointer; border-bottom:1px solid #1a1a1a; transition:background .2s; }
  .chat-user-item:hover, .chat-user-item.active { background:#1a1a1a; }
  .chat-user-av { width:38px;height:38px;border-radius:50%;background:#7c6af7;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:.9rem;overflow:hidden;flex-shrink:0; }
  .chat-user-av img { width:100%;height:100%;object-fit:cover; }
  .chat-user-name { font-weight:700;font-size:.9rem; }
  .chat-user-preview { font-size:.75rem;color:#555;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:140px; }
  .chat-main { flex:1; background:#111; border:1px solid #222; border-radius:16px; display:flex; flex-direction:column; overflow:hidden; }
  .chat-header { padding:16px 20px; border-bottom:1px solid #222; display:flex; align-items:center; gap:12px; }
  .chat-header-av { width:40px;height:40px;border-radius:50%;background:#7c6af7;display:flex;align-items:center;justify-content:center;font-weight:800;overflow:hidden; }
  .chat-header-av img { width:100%;height:100%;object-fit:cover; }
  .chat-header-name { font-weight:800; }
  .chat-header-mutual { font-size:.75rem;color:#7c6af7; }
  .chat-messages { flex:1; overflow-y:auto; padding:20px; display:flex; flex-direction:column; gap:12px; }
  .chat-msg { display:flex; gap:10px; align-items:flex-end; }
  .chat-msg.mine { flex-direction:row-reverse; }
  .chat-msg-av { width:32px;height:32px;border-radius:50%;background:#7c6af7;display:flex;align-items:center;justify-content:center;font-size:.8rem;font-weight:800;flex-shrink:0;overflow:hidden; }
  .chat-msg-av img { width:100%;height:100%;object-fit:cover; }
  .chat-msg-bubble { max-width:65%; background:#1a1a1a; border-radius:16px 16px 16px 4px; padding:10px 14px; font-size:.9rem; line-height:1.5; }
  .chat-msg.mine .chat-msg-bubble { background:#7c6af7; border-radius:16px 16px 4px 16px; }
  .chat-msg-time { font-size:.65rem; color:#555; margin-top:4px; }
  .chat-input-wrap { padding:16px; border-top:1px solid #222; display:flex; gap:10px; }
  .chat-input-wrap input { flex:1; background:#1a1a1a; border:1px solid #333; border-radius:12px; padding:12px 16px; color:#fff; font-size:.9rem; }
  .chat-input-wrap input:focus { outline:none; border-color:#7c6af7; }
  .chat-send-btn { background:#7c6af7; border:none; color:#fff; padding:12px 20px; border-radius:12px; cursor:pointer; font-weight:700; }
  .chat-send-btn:hover { background:#6b5ce7; }
  .chat-empty { flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:12px;color:#555; }
  .chat-empty i { font-size:2.5rem; }
  .no-mutual { text-align:center;padding:40px 20px;color:#555; }
</style>
</head>
<body>
<canvas id="particles"></canvas>
<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="./"><div class="logo-glow">⚡</div><span>Script<span class="acc">Drop</span></span></a>
    <div class="nav-right">
      <div id="nav-guest" class="nav-auth">
        <a href="login" class="btn-ghost-sm">Entrar</a>
        <a href="register" class="btn-primary-sm">Registrar</a>
      </div>
      <div id="nav-logged" class="nav-user-area" style="display:none">
        <div class="notif-wrap" id="notifWrap">
          <button class="notif-btn" id="notifBtn"><i class="fas fa-bell"></i><span class="notif-badge" id="notifBadge" style="display:none"></span></button>
          <div class="notif-panel" id="notifPanel"></div>
        </div>
        <div class="nav-avatar-wrap" id="navAvatarWrap">
          <div class="nav-avatar" id="navAvatar"></div>
          <span id="navName"></span>
          <i class="fas fa-chevron-down nav-chev"></i>
          <div class="nav-dropdown" id="navDropdown">
            <a href="profile"><i class="fas fa-user"></i> Meu Perfil</a>
            <a href="settings"><i class="fas fa-cog"></i> Configurações</a>
            <div class="dd-divider"></div>
            <a onclick="logout()" style="color:#ff6b6b;cursor:pointer"><i class="fas fa-sign-out-alt"></i> Sair</a>
          </div>
        </div>
      </div>
    </div>
  </div>
</nav>

<div class="chat-wrap" id="chatWrap">
  <div class="chat-list">
    <div class="chat-list-title"><i class="fas fa-comments"></i> Conversas</div>
    <div id="chatUserList"></div>
  </div>
  <div class="chat-main" id="chatMain">
    <div class="chat-empty"><i class="fas fa-comment-dots"></i><span>Selecione uma conversa</span></div>
  </div>
</div>

<script src="app.js"></script>
<script>
const session = getSession();
if (!session) location.href = 'login';

let currentWith = new URLSearchParams(location.search).get('with') || null;

function getMutuals() {
  const users = getUsers();
  const me = users.find(u => u.username === session);
  if (!me) return [];
  return (me.following || []).filter(f => isMutualFollow(session, f));
}

function renderChatList() {
  const mutuals = getMutuals();
  const list = document.getElementById('chatUserList');
  if (!mutuals.length) {
    list.innerHTML = '<div class="no-mutual"><i class="fas fa-user-friends" style="font-size:2rem;color:#333;display:block;margin-bottom:10px"></i>Siga alguém e peça para te seguir de volta para conversar.</div>';
    return;
  }
  const users = getUsers();
  list.innerHTML = mutuals.map(u => {
    const user = users.find(x => x.username === u) || {};
    const av = user.avatarURL ? `<img src='${user.avatarURL}'>` : u.charAt(0).toUpperCase();
    const msgs = getMessages(u);
    const last = msgs.length ? msgs[msgs.length-1].text : 'Nenhuma mensagem';
    return `<div class="chat-user-item ${currentWith===u?'active':''}" onclick="openChat('${u}')">
      <div class="chat-user-av" style="background:${user.avatarColor||'#7c6af7'}">${av}</div>
      <div><div class="chat-user-name">${escapeHtml(u)}</div><div class="chat-user-preview">${escapeHtml(last.slice(0,30))}</div></div>
    </div>`;
  }).join('');
}

function openChat(withUser) {
  currentWith = withUser;
  renderChatList();
  const users = getUsers();
  const user = users.find(u => u.username === withUser) || {};
  const av = user.avatarURL ? `<img src='${user.avatarURL}'>` : withUser.charAt(0).toUpperCase();
  const main = document.getElementById('chatMain');
  main.innerHTML = `
    <div class="chat-header">
      <div class="chat-header-av" style="background:${user.avatarColor||'#7c6af7'}">${av}</div>
      <div><div class="chat-header-name">${escapeHtml(withUser)}</div><div class="chat-header-mutual"><i class="fas fa-heart"></i> Seguindo mutuamente</div></div>
      <a href="profile?user=${encodeURIComponent(withUser)}" style="margin-left:auto;color:#7c6af7;font-size:.85rem"><i class="fas fa-user"></i> Perfil</a>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input-wrap">
      <input type="text" id="chatInput" placeholder="Digite uma mensagem..." onkeydown="if(event.key==='Enter')doSend()">
      <button class="chat-send-btn" onclick="doSend()"><i class="fas fa-paper-plane"></i></button>
    </div>`;
  renderMessages();
}

function renderMessages() {
  const el = document.getElementById('chatMessages');
  if (!el || !currentWith) return;
  const msgs = getMessages(currentWith);
  const users = getUsers();
  if (!msgs.length) { el.innerHTML = '<div style="text-align:center;color:#555;padding:20px;font-size:.85rem">Nenhuma mensagem ainda. Diga olá! 👋</div>'; return; }
  el.innerHTML = msgs.map(m => {
    const u = users.find(x => x.username === m.from) || {};
    const av = u.avatarURL ? `<img src='${u.avatarURL}'>` : m.from.charAt(0).toUpperCase();
    const mine = m.from === session;
    return `<div class="chat-msg ${mine?'mine':''}">
      <div class="chat-msg-av" style="background:${u.avatarColor||'#7c6af7'}">${av}</div>
      <div><div class="chat-msg-bubble">${escapeHtml(m.text)}</div><div class="chat-msg-time">${timeAgo(m.ts)}</div></div>
    </div>`;
  }).join('');
  el.scrollTop = el.scrollHeight;
}

function doSend() {
  const input = document.getElementById('chatInput');
  if (!input || !currentWith) return;
  sendMessage(currentWith, input.value);
  input.value = '';
  renderMessages();
  renderChatList();
}

renderChatList();
if (currentWith) openChat(currentWith);

// auto-refresh messages
setInterval(() => { if (currentWith) renderMessages(); }, 3000);
</script>
</body>
</html>
