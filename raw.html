<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<title>Raw — I'mScripts System</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@600;800&display=swap" rel="stylesheet"/>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#000;color:#e0e0e0;font-family:'JetBrains Mono',monospace;font-size:14px;line-height:1.8;min-height:100vh;display:flex;flex-direction:column}
  .raw-topbar{background:rgba(10,10,10,.97);backdrop-filter:blur(12px);border-bottom:1px solid #1a1a1a;padding:12px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:100;flex-wrap:wrap;gap:10px}
  .raw-logo{font-family:'Inter',sans-serif;font-weight:800;font-size:1rem;background:linear-gradient(135deg,#fff,#888);-webkit-background-clip:text;-webkit-text-fill-color:transparent;display:flex;align-items:center;gap:8px;text-decoration:none}
  .raw-meta{display:flex;align-items:center;gap:10px;flex-wrap:wrap}
  .raw-badge{background:#111;border:1px solid #222;padding:4px 12px;border-radius:20px;font-size:.72rem;color:#888;font-family:'Inter',sans-serif;display:flex;align-items:center;gap:5px}
  .raw-badge b{color:#fff}
  .raw-actions{display:flex;gap:8px}
  .raw-btn{background:#111;border:1px solid #222;color:#aaa;padding:6px 14px;border-radius:8px;font-size:.78rem;font-family:'Inter',sans-serif;font-weight:600;cursor:pointer;display:flex;align-items:center;gap:6px;transition:all .2s;text-decoration:none}
  .raw-btn:hover{background:#1a1a1a;color:#fff;border-color:#333}
  .raw-btn.primary{background:linear-gradient(135deg,#2a2a2a,#111);color:#fff;border-color:#333}
  .raw-btn.copied{background:#0d2a1a;border-color:#00d4aa;color:#00d4aa}
  .raw-wrap{display:flex;flex:1;overflow:auto}
  .raw-lines{background:#050505;padding:20px 16px;text-align:right;color:#2a2a2a;font-size:13px;line-height:1.8;user-select:none;border-right:1px solid #111;min-width:52px;flex-shrink:0}
  .raw-code{padding:20px 24px;white-space:pre;overflow-x:auto;flex:1;font-size:13.5px;color:#d4d4d4;background:#000;line-height:1.8}
  .raw-code::-webkit-scrollbar{height:5px;width:5px}
  .raw-code::-webkit-scrollbar-thumb{background:#1a1a1a;border-radius:3px}
  .raw-loading{flex:1;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;color:#333}
  .raw-spinner{width:28px;height:28px;border:2px solid #1a1a1a;border-top-color:#444;border-radius:50%;animation:spin .7s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}
  .raw-footer{background:#050505;border-top:1px solid #0d0d0d;padding:10px 24px;display:flex;align-items:center;justify-content:space-between;font-size:.7rem;color:#2a2a2a;font-family:'Inter',sans-serif;flex-wrap:wrap;gap:8px}
  .raw-footer a{color:#444;text-decoration:none}
  .raw-footer a:hover{color:#fff}
</style>
</head>
<body>

<div class="raw-topbar">
  <a class="raw-logo" href="./">
    <span>⚡</span> I'mScripts<span style="opacity:.4;margin-left:2px">System</span>
  </a>
  <div class="raw-meta">
    <div class="raw-badge" id="rawTitle"><b>Carregando...</b></div>
    <div class="raw-badge" id="rawAuthor" style="display:none"><span>por</span>&nbsp;<b id="rawAuthorName"></b></div>
    <div class="raw-badge" id="rawLines" style="display:none"><b id="rawLineCount"></b>&nbsp;<span>linhas</span></div>
    <div class="raw-badge" id="rawSize" style="display:none"><b id="rawSizeVal"></b></div>
  </div>
  <div class="raw-actions">
    <button class="raw-btn primary" id="copyBtn" onclick="copyRaw()">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>
      Copiar
    </button>
    <a class="raw-btn" id="backBtn" href="./">
      <svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      Voltar
    </a>
  </div>
</div>

<div id="rawContent" class="raw-loading">
  <div class="raw-spinner"></div>
  <span style="font-family:'Inter',sans-serif;font-size:.82rem">Carregando script...</span>
</div>

<div class="raw-footer">
  <span>⚡ I'mScripts System — Raw Viewer</span>
  <span id="rawGame"></span>
  <a href="./">← Voltar ao site</a>
</div>

<script>
let _rawCode = '';

function esc(s) { return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }
function formatSize(b) { return b < 1024 ? b + ' B' : (b/1024).toFixed(1) + ' KB'; }

async function loadRaw() {
  const id = new URLSearchParams(location.search).get('id');
  const content = document.getElementById('rawContent');

  if (!id) {
    content.innerHTML = '<span style="font-family:Inter,sans-serif;color:#ff4757;font-size:.9rem">❌ ID inválido.</span>';
    return;
  }

  try {
    const post = await DB.get('posts/' + id);

    if (!post) {
      content.innerHTML = '<span style="font-family:Inter,sans-serif;color:#ff4757;font-size:.9rem">❌ Script não encontrado.</span>';
      return;
    }

    _rawCode = post.code || '';
    const lines = _rawCode.split('\n');

    document.title = post.title + ' — Raw | I\'mScripts System';
    document.getElementById('rawTitle').innerHTML = '<b>' + esc(post.title) + '</b>';
    document.getElementById('rawAuthorName').textContent = post.author || '';
    document.getElementById('rawAuthor').style.display = 'flex';
    document.getElementById('rawLineCount').textContent = lines.length;
    document.getElementById('rawLines').style.display = 'flex';
    document.getElementById('rawSizeVal').textContent = formatSize(_rawCode.length);
    document.getElementById('rawSize').style.display = 'flex';
    document.getElementById('backBtn').href = 'script?id=' + id;
    if (post.game) document.getElementById('rawGame').textContent = '🎮 ' + post.game;

    const lineNums = lines.map(function(_, i){ return i + 1; }).join('\n');
    content.className = 'raw-wrap';
    content.innerHTML = '<div class="raw-lines">' + lineNums + '</div><pre class="raw-code">' + esc(_rawCode) + '</pre>';

  } catch(e) {
    content.innerHTML = '<span style="font-family:Inter,sans-serif;color:#ff4757;font-size:.9rem">❌ Erro ao carregar: ' + e.message + '</span>';
  }
}

function copyRaw() {
  if (!_rawCode) return;
  navigator.clipboard.writeText(_rawCode).then(function() {
    var btn = document.getElementById('copyBtn');
    btn.classList.add('copied');
    btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="20 6 9 17 4 12"/></svg> Copiado!';
    setTimeout(function() {
      btn.classList.remove('copied');
      btn.innerHTML = '<svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg> Copiar';
    }, 2000);
  });
}

// Chama após tudo carregar
window.onload = loadRaw;
</script>
</body>
</html>
