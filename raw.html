<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>ScriptDrop — Raw</title>
    <style>
        body { margin: 0; background: #000; color: #fff; font-family: monospace; white-space: pre-wrap; word-break: break-all; padding: 20px; }
    </style>
</head>
<body><pre id="output">Carregando script...</pre>

<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>

<script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get('id');

    if (id) {
        const db = firebase.database();
        db.ref('posts/' + id).once('value').then(snapshot => {
            const data = snapshot.val();
            if (data) {
                // Formatação estilo GitHub Raw com metadados em comentários Lua
                const author = data.author || 'Anônimo';
                const tags = data.tags ? data.tags.join(', ') : 'Nenhuma';
                const title = data.title || 'Sem título';
                
                const rawCode = `-- [[ ScriptDrop Premium Raw System ]]\n` +
                                `-- Autor: ${author}\n` +
                                `-- Script: ${title}\n` +
                                `-- Tags: ${tags}\n` +
                                `-- Data: ${data.date || ''}\n\n` +
                                data.code;

                document.getElementById('output').textContent = rawCode;
            } else {
                document.getElementById('output').textContent = "-- Erro: Script não encontrado.";
            }
        });
    } else {
        document.getElementById('output').textContent = "-- Erro: ID não fornecido.";
    }
</script>
</body>
</html>
