<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Registrar — ScriptDrop</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<!-- Firebase -->
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<script src="firebase.js"></script>
</head>
<body class="auth-body">
<canvas id="particles"></canvas>
<div class="auth-orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<nav class="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="index.html"><div class="logo-glow">⚡</div><span>Script<span class="acc">Drop</span></span></a>
  </div>
</nav>

<main class="auth-main">
  <div class="auth-card animate-scale">
    <div class="auth-icon-wrap"><div class="auth-icon" style="background:linear-gradient(135deg,#ff6b35,#ff4757)"><i class="fas fa-rocket"></i></div></div>
    <h2 class="auth-title">Criar Conta</h2>
    <p class="auth-sub">Junte-se à comunidade e comece a postar scripts</p>
    <div class="fg">
      <label><i class="fas fa-user"></i> Usuário</label>
      <input type="text" id="username" placeholder="Escolha um usuário" autocomplete="off"/>
    </div>
    <div class="fg">
      <label><i class="fas fa-lock"></i> Senha</label>
      <div class="input-eye">
        <input type="password" id="password" placeholder="Crie uma senha"/>
        <button class="eye-btn" onclick="togglePass('password',this)"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <div class="fg">
      <label><i class="fas fa-check-circle"></i> Confirmar Senha</label>
      <div class="input-eye">
        <input type="password" id="confirm" placeholder="Repita a senha" onkeydown="if(event.key==='Enter')register()"/>
        <button class="eye-btn" onclick="togglePass('confirm',this)"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <p id="error" class="err-msg"></p>
    <button class="btn-auth" style="background:linear-gradient(135deg,#ff6b35,#ff4757)" onclick="register()"><i class="fas fa-user-plus"></i> Criar Conta</button>
    <p class="auth-switch">Já tem conta? <a href="login">Fazer login →</a></p>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
