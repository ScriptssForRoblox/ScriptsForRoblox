<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Premium & Configurações</title>
    <!-- Importando ícones e fontes modernas -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #7c3aed;
            --accent-color: #3b82f6;
            --bg-dark: #0f172a;
            --glass-bg: rgba(30, 41, 59, 0.7);
            --border-color: rgba(255, 255, 255, 0.1);
            --text-main: #f8fafc;
            --text-dim: #94a3b8;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Inter', sans-serif;
        }

        body {
            background-color: var(--bg-dark);
            background-image: radial-gradient(circle at top right, #1e1b4b, transparent),
                              radial-gradient(circle at bottom left, #1e1b4b, transparent);
            color: var(--text-main);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            padding: 20px;
        }

        .main-container {
            width: 100%;
            max-width: 1100px;
            animation: fadeIn 0.8s ease-out;
        }

        /* --- HEADER / PERFIL --- */
        .profile-header {
            position: relative;
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 24px;
            overflow: hidden;
            margin-bottom: 30px;
            transition: transform 0.3s ease;
        }

        .banner {
            height: 180px;
            background: linear-gradient(135deg, var(--primary-color), var(--accent-color));
            position: relative;
        }

        .profile-content {
            padding: 0 40px 30px;
            display: flex;
            align-items: flex-end;
            margin-top: -60px;
            gap: 25px;
        }

        .avatar-container {
            position: relative;
        }

        .avatar {
            width: 140px;
            height: 140px;
            border-radius: 30px;
            border: 6px solid var(--bg-dark);
            background: #475569;
            object-fit: cover;
            box-shadow: 0 10px 25px rgba(0,0,0,0.3);
            animation: float 4s ease-in-out infinite;
        }

        .user-info h1 {
            font-size: 1.8rem;
            font-weight: 600;
        }

        .user-info p {
            color: var(--text-dim);
            font-size: 1rem;
        }

        /* --- GRID DE CONFIGURAÇÕES (Corrige o erro de empilhamento) --- */
        .settings-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 25px;
        }

        .card {
            background: var(--glass-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border-color);
            border-radius: 20px;
            padding: 30px;
            animation: slideUp 0.6s ease-out backwards;
        }

        .card:nth-child(2) { animation-delay: 0.2s; }

        .card-title {
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 1.2rem;
            margin-bottom: 25px;
            color: var(--accent-color);
            border-bottom: 1px solid var(--border-color);
            padding-bottom: 15px;
        }

        /* --- FORMULÁRIOS --- */
        .input-group {
            margin-bottom: 20px;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            font-size: 0.9rem;
            color: var(--text-dim);
        }

        .input-wrapper {
            position: relative;
            display: flex;
            align-items: center;
        }

        .input-wrapper i {
            position: absolute;
            left: 15px;
            color: var(--text-dim);
        }

        input, select, textarea {
            width: 100%;
            background: rgba(15, 23, 42, 0.8);
            border: 1px solid var(--border-color);
            padding: 12px 15px 12px 45px;
            border-radius: 12px;
            color: white;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 0 4px rgba(124, 58, 237, 0.1);
        }

        .btn-save {
            background: linear-gradient(to right, var(--primary-color), var(--accent-color));
            color: white;
            border: none;
            padding: 14px;
            border-radius: 12px;
            font-weight: 600;
            cursor: pointer;
            width: 100%;
            transition: transform 0.2s, filter 0.2s;
            margin-top: 10px;
        }

        .btn-save:hover {
            filter: brightness(1.1);
            transform: translateY(-2px);
        }

        /* --- ANIMAÇÕES --- */
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        /* Responsividade */
        @media (max-width: 768px) {
            .profile-content {
                flex-direction: column;
                align-items: center;
                text-align: center;
            }
            .avatar { margin-top: -20px; }
            .settings-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="main-container">
        <!-- Perfil Estilizado -->
        <header class="profile-header">
            <div class="banner"></div>
            <div class="profile-content">
                <div class="avatar-container">
                    <img src="https://api.dicebear.com/7.x/avataaars/svg?seed=Felix" alt="Avatar" class="avatar">
                </div>
                <div class="user-info">
                    <h1>Seu Nome de Usuário</h1>
                    <p><i class="fa-regular fa-envelope"></i> usuario@exemplo.com</p>
                </div>
            </div>
        </header>

        <!-- Configurações Organizadas -->
        <div class="settings-grid">
            
            <!-- Card 1: Conta -->
            <section class="card">
                <h2 class="card-title"><i class="fas fa-user-edit"></i> Dados Pessoais</h2>
                <div class="input-group">
                    <label>Nome Completo</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user"></i>
                        <input type="text" placeholder="Ex: João Silva">
                    </div>
                </div>
                <div class="input-group">
                    <label>Biografia</label>
                    <div class="input-wrapper">
                        <i class="fas fa-pen"></i>
                        <input type="text" placeholder="Conte um pouco sobre você...">
                    </div>
                </div>
                <button class="btn-save">Atualizar Perfil</button>
            </section>

            <!-- Card 2: Preferências -->
            <section class="card">
                <h2 class="card-title"><i class="fas fa-sliders-h"></i> Preferências</h2>
                <div class="input-group">
                    <label>Tema da Interface</label>
                    <div class="input-wrapper">
                        <i class="fas fa-moon"></i>
                        <select>
                            <option>Dark Mode (Padrão)</option>
                            <option>Light Mode</option>
                            <option>Ametista</option>
                        </select>
                    </div>
                </div>
                <div class="input-group">
                    <label>Visibilidade do Perfil</label>
                    <div class="input-wrapper">
                        <i class="fas fa-eye"></i>
                        <select>
                            <option>Público</option>
                            <option>Privado</option>
                        </select>
                    </div>
                </div>
                <button class="btn-save" style="background: rgba(255,255,255,0.05); border: 1px solid var(--border-color);">Redefinir Senha</button>
            </section>

        </div>
    </div>

</body>
</html>
