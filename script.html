        <button class="btn-post-nav" onclick="location.href='post'"><sd-icon name="plus" size="15"></sd-icon> Postar</button>

<div class="script-page-wrap" id="scriptPageWrap">
  <div style="text-align:center;padding:100px;color:#555"><i class="fas fa-spinner fa-spin" style="font-size:2rem"></i><p style="margin-top:15px">Carregando script...</p></div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">⚡ Script<span class="acc">Drop</span></div>
    <p>© 2025 ScriptDrop</p>
  </div>
</footer>

<script src="app.js"></script>
<script>
function esc(s){return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}

async function loadScript() {
  const params = new URLSearchParams(location.search);
  const id = params.get('id');
  const wrap = document.getElementById('scriptPageWrap');

  if (!id) { wrap.innerHTML = '<div class="sp-err"><i class="fas fa-exclamation-triangle"></i><h2>ID inválido</h2><a href="./" class="btn-hero-primary">Voltar</a></div>'; return; }

  const post = await DB.get('posts/' + id);
  if (!post) { wrap.innerHTML = '<div class="sp-err"><i class="fas fa-exclamation-triangle"></i><h2>Script não encontrado</h2><a href="./" class="btn-hero-primary">Voltar</a></div>'; return; }

  // Incrementa views
  await DB.update('posts/' + id, { views: (post.views || 0) + 1 });

  // Busca autor
  const authorUID = await DB.get('usernames/' + (post.author || '').toLowerCase());
  const author = authorUID ? (await DB.get('users/' + authorUID) || {}) : {};

  document.title = post.title + ' — ScriptDrop';

  const tagsHtml = (post.tags || []).map(t => `<span class="tag-chip">${esc(t)}</span>`).join('');
  const imgHtml = post.image ? `<div class="sp-cover"><img src="${esc(post.image)}" onerror="this.parentElement.style.display='none'"/></div>` : '';

  // Aguarda auth para botões de follow/chat
  let tries = 0;
  while (!_currentUser && tries < 30) { await new Promise(r => setTimeout(r, 100)); tries++; }

  const isOwn = _currentUser?.username === post.author;
  const isFollowing = (_currentUser?.following || []).includes(post.author);
  const followBtn = !isOwn && _currentUser ? `<button class="btn-follow ${isFollowing ? 'following' : ''}" onclick="toggleFollow('${esc(post.author)}')"><i class="fas ${isFollowing ? 'fa-user-check' : 'fa-user-plus'}"></i> ${isFollowing ? 'Seguindo' : 'Seguir'}</button>` : '';

  const avContent = author.avatarURL ? `<img src='${author.avatarURL}' style='width:100%;height:100%;object-fit:cover'>` : (post.author || '?').charAt(0).toUpperCase();

  // Mais scripts
  const allPosts = await DB.get('posts') || {};
  const morePosts = Object.values(allPosts).filter(p => p.id !== id).sort((a,b) => b.ts - a.ts).slice(0, 5);

  wrap.innerHTML = `
  <div class="sp-hero" ${author.banner ? `style="background-image:url('${author.banner}');background-size:cover;background-position:center"` : ''}></div>
  <div class="sp-content">
    <div class="sp-main">
      ${imgHtml}
      <div class="sp-header">
        <div class="sp-title-area">
          <h1 class="sp-title">${esc(post.title)} ${post.isVerifiedPost ? '<span style="color:#1e90ff">✅</span>' : ''}</h1>
          <div class="sp-meta">
            <span><i class="fas fa-gamepad"></i> ${esc(post.game || 'Universal')}</span>
            <span><i class="fas fa-eye"></i> ${(post.views || 0) + 1} views</span>
            <span><i class="fas fa-calendar"></i> ${post.date || ''}</span>
            <span><i class="fas fa-user"></i> <a href="profile?user=${encodeURIComponent(post.author)}" style="color:#7c6af7">${esc(post.author)}</a></span>
          </div>
          <div class="sp-tags">${tagsHtml}</div>
        </div>
        <div class="sp-actions">
          <button class="btn-copy-big" id="copyBtn" onclick="copyScriptPage('${id}')"><i class="fas fa-copy"></i> Copiar Script</button>
          <a href="raw?id=${id}" class="btn-raw" target="_blank"><i class="fas fa-file-code"></i> Raw</a>
        </div>
      </div>
      ${post.desc ? `<div class="sp-desc"><h3><i class="fas fa-info-circle"></i> Descrição</h3><p>${esc(post.desc)}</p></div>` : ''}
      <div class="sp-code-block">
        <div class="sp-code-bar">
          <span><i class="fas fa-code"></i> Script</span>
          <button onclick="copyScriptPage('${id}')" id="copyBtn2"><i class="fas fa-copy"></i> Copiar</button>
        </div>
        <pre class="sp-code">${esc(post.code)}</pre>
      </div>
      <div class="comment-section">
        <h3 style="margin-bottom:20px"><i class="fas fa-comments" style="color:#7c6af7"></i> Comentários</h3>
        <div class="comment-input-wrap">
          <input type="text" id="cInput" placeholder="Escreva um comentário..." onkeydown="if(event.key==='Enter')addComment('${id}')">
          <button class="btn-send" onclick="addComment('${id}')">Enviar</button>
        </div>
        <div id="commentList"></div>
      </div>
    </div>
    <aside class="sp-sidebar">
      <div class="sp-author-card">
        <div class="sp-author-banner" ${author.banner ? `style="background-image:url('${author.banner}');background-size:cover"` : ''}></div>
        <div class="sp-author-body">
          <div class="sp-author-av" style="background:${author.avatarColor || '#7c6af7'}">${avContent}</div>
          <div class="sp-author-name">${esc(post.author)}</div>
          <div class="sp-author-bio">${esc(author.bio || 'Sem bio.')}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px">
            <a href="profile?user=${encodeURIComponent(post.author)}" class="btn-view-profile">Ver Perfil</a>
            ${followBtn}
          </div>
        </div>
      </div>
      <div class="sp-more-card">
        <div class="sc-title"><i class="fas fa-layer-group" style="color:#7c6af7"></i> Mais Scripts</div>
        <div id="moreScripts">${morePosts.length
          ? morePosts.map(p => `<a href="script?id=${p.id}" class="more-item"><div class="more-title">${esc(p.title)}</div><div class="more-meta">${esc(p.author)} · ${esc(p.game || 'Universal')}</div></a>`).join('')
          : '<p style="color:#555;font-size:.85rem">Nenhum outro script.</p>'
        }</div>
      </div>
    </aside>
  </div>`;

  renderComments(id);
}

function copyScriptPage(id) {
  DB.get('posts/' + id).then(post => {
    if (!post) return;
    navigator.clipboard.writeText(post.code).then(() => {
      ['copyBtn','copyBtn2'].forEach(bid => {
        const b = document.getElementById(bid);
        if (b) { b.innerHTML = '<i class="fas fa-check"></i> Copiado!'; b.classList.add('copied'); setTimeout(() => { b.innerHTML = '<i class="fas fa-copy"></i> Copiar Script'; b.classList.remove('copied'); }, 2000); }
      });
      showNotification('Script copiado!');
    });
  });
}

auth.onAuthStateChanged(() => loadScript());
</script>
