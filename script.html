<nav class="navbar" id="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="./"><div class="logo-glow"><sd-icon name="bolt" size="22"></sd-icon></div><span>Script<span class="acc">Drop</span></span></a>
    <div class="nav-links">
      <a href="./" class="nl"><sd-icon name="home" size="16"></sd-icon> Home</a>
      <a href="./#scripts" class="nl"><sd-icon name="code" size="16"></sd-icon> Scripts</a>
    </div>
    <div class="nav-right">
      <div id="nav-guest" class="nav-auth">
        <a href="login" class="btn-ghost-sm">Entrar</a>
        <a href="register" class="btn-primary-sm">Registrar</a>
      </div>
      <div id="nav-logged" class="nav-user-area" style="display:none">
        <button class="btn-admin-nav" id="navAdminBtn" onclick="location.href='settings'" style="display:none"><sd-icon name="crown" size="15"></sd-icon> Admin</button>
        <button class="btn-post-nav" onclick="window.location='./'"><sd-icon name="plus" size="15"></sd-icon> Postar</button>
        <div class="notif-wrap" id="notifWrap">
          <button class="notif-btn" id="notifBtn"><sd-icon name="bell" size="16"></sd-icon><span class="notif-badge" id="notifBadge" style="display:none"></span></button>
          <div class="notif-panel" id="notifPanel"></div>

        <div class="nav-avatar-wrap" id="navAvatarWrap">
          <div class="nav-avatar" id="navAvatar"></div>

          <div class="nav-dropdown" id="navDropdown">
            <a href="profile"><sd-icon name="user" size="15"></sd-icon> Meu Perfil</a>
            <a href="settings"><sd-icon name="gear" size="15"></sd-icon> Configurações</a>
            <div class="dd-divider"></div>

<div class="script-page-wrap" id="scriptPageWrap">
  <div class="sp-loading"><i class="fas fa-spinner fa-spin"></i> Carregando...</div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-logo">⚡ Script<span class="acc">Drop</span></div>
    <p>© 2025 ScriptDrop</p>
  </div>
</footer>

<script src="app.js"></script>
<script>
(function(){
  const params = new URLSearchParams(location.search);
  const id = parseInt(params.get('id'));
  const posts = getPosts();
  const post = posts.find(p => p.id === id);
  const wrap = document.getElementById('scriptPageWrap');

  if(!post){ wrap.innerHTML='<div class="sp-err"><i class="fas fa-exclamation-triangle"></i><h2>Script não encontrado</h2><a href="./" class="btn-hero-primary">Voltar</a></div>'; return; }

  post.views = (post.views||0)+1;
  posts[posts.findIndex(p=>p.id===id)] = post;
  savePosts(posts);

  const users = getUsers();
  const author = users.find(u=>u.username===post.author)||{};
  const session = getSession();
  const avatarColor = author.avatarColor||'#7c6af7';
  const avContent = author.avatarURL ? `<img src='${author.avatarURL}' style='width:100%;height:100%;object-fit:cover'>` : post.author.charAt(0).toUpperCase();
  const tagsHtml = (post.tags||[]).map(t=>`<span class="tag-chip">${escapeHtml(t)}</span>`).join('');
  const imgHtml = post.image ? `<div class="sp-cover"><img src="${escapeHtml(post.image)}" onerror="this.parentElement.style.display='none'"/></div>` : '';

  // follow button
  const isOwn = session === post.author;
  const isFollowing = (users.find(u=>u.username===session)?.following||[]).includes(post.author);
  const mutual = isMutualFollow(session, post.author);
  const followBtn = !isOwn && session ? `<button class="btn-follow ${isFollowing?'following':''}" onclick="toggleFollow('${escapeHtml(post.author)}')">
    <i class="fas ${isFollowing?'fa-user-check':'fa-user-plus'}"></i> ${isFollowing?'Seguindo':'Seguir'}
  </button>` : '';
  const chatBtn = mutual && !isOwn ? `<a href="chat?with=${encodeURIComponent(post.author)}" class="btn-chat-link"><i class="fas fa-comment"></i> Chat</a>` : '';

  wrap.innerHTML = `
  <div class="sp-hero" ${author.banner?`style="background-image:url('${author.banner}');background-size:cover;background-position:center"`:''}></div>
  <div class="sp-content">
    <div class="sp-main">
      ${imgHtml}
      <div class="sp-header">
        <div class="sp-title-area">
          <h1 class="sp-title">${escapeHtml(post.title)} ${post.isVerifiedPost?'<span style="color:#1e90ff">✅</span>':''}</h1>
          <div class="sp-meta">
            <span><i class="fas fa-gamepad"></i> ${escapeHtml(post.game||'Universal')}</span>
            <span><i class="fas fa-eye"></i> ${post.views} views</span>
            <span><i class="fas fa-calendar"></i> ${post.date}</span>
          </div>
          <div class="sp-tags">${tagsHtml}</div>
        </div>
        <div class="sp-actions">
          <button class="btn-copy-big" id="copyBtn" onclick="copyScriptPage(${post.id})"><i class="fas fa-copy"></i> Copiar Script</button>
          <a href="raw?id=${post.id}" class="btn-raw" target="_blank"><i class="fas fa-file-code"></i> Raw</a>
        </div>
      </div>
      ${post.desc?`<div class="sp-desc"><h3><i class="fas fa-info-circle"></i> Descrição</h3><p>${escapeHtml(post.desc)}</p></div>`:''}
      <div class="sp-code-block">
        <div class="sp-code-bar">
          <span><i class="fas fa-code"></i> Script</span>
          <button onclick="copyScriptPage(${post.id})" id="copyBtn2"><i class="fas fa-copy"></i> Copiar</button>
        </div>
        <pre class="sp-code">${escapeHtml(post.code)}</pre>
      </div>
      <div class="comment-section">
        <h3><i class="fas fa-comments"></i> Comentários</h3>
        <div class="comment-input-wrap">
          <input type="text" id="cInput" placeholder="Escreva um comentário..." onkeydown="if(event.key==='Enter')addComment(${post.id})">
          <button class="btn-send" onclick="addComment(${post.id})">Enviar</button>
        </div>
        <div id="commentList"></div>
      </div>
    </div>
    <aside class="sp-sidebar">
      <div class="sp-author-card">
        <div class="sp-author-banner" ${author.banner?`style="background-image:url('${author.banner}');background-size:cover"`:''}></div>
        <div class="sp-author-body">
          <div class="sp-author-av" style="background:${avatarColor}">${avContent}</div>
          <div class="sp-author-name">${escapeHtml(post.author)}</div>
          <div class="sp-author-bio">${escapeHtml(author.bio||'Sem bio.')}</div>
          <div style="display:flex;gap:8px;flex-wrap:wrap;justify-content:center;margin-top:10px">
            <a href="profile?user=${encodeURIComponent(post.author)}" class="btn-view-profile">Ver Perfil</a>
            ${followBtn}
            ${chatBtn}
          </div>
        </div>
      </div>
      <div class="sp-more-card">
        <div class="sc-title"><i class="fas fa-layer-group"></i> Mais Scripts</div>
        <div id="moreScripts"></div>
      </div>
    </aside>
  </div>`;

  const more = posts.filter(p=>p.id!==id).slice(0,5);
  document.getElementById('moreScripts').innerHTML = more.length
    ? more.map(p=>`<a href="script?id=${p.id}" class="more-item"><div class="more-title">${escapeHtml(p.title)}</div><div class="more-meta">${escapeHtml(p.author)} · ${escapeHtml(p.game||'Universal')}</div></a>`).join('')
    : '<p style="color:#555;font-size:.85rem">Nenhum outro script.</p>';

  renderComments(post.id);
})();

function copyScriptPage(id){
  const post = getPosts().find(p=>p.id===id);
  if(!post) return;
  navigator.clipboard.writeText(post.code).then(()=>{
    ['copyBtn','copyBtn2'].forEach(bid=>{
      const b=document.getElementById(bid);
      if(b){b.innerHTML='<i class="fas fa-check"></i> Copiado!';b.classList.add('copied');setTimeout(()=>{b.innerHTML='<i class="fas fa-copy"></i> Copiar Script';b.classList.remove('copied');},2000);}
    });
    showNotification('Script copiado!');
  });
}
</script>
</body>
</html>
