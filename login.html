<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>Login — ScriptDrop</title>

<!-- Open Graph / Discord Rich Embed -->
<meta property="og:site_name" content="ScriptDrop">
<meta property="og:title" content="Entrar no ScriptDrop">
<meta property="og:description" content="Faça login para gerenciar seus scripts e interagir com a comunidade.">
<meta name="theme-color" content="#7c6af7">

<link rel="icon" type="image/svg+xml" href="favicon.svg"/>
<link rel="stylesheet" href="style.css"/>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
</head>
<body class="auth-body">
<canvas id="particles"></canvas>
<div class="auth-orbs"><div class="orb o1"></div><div class="orb o2"></div><div class="orb o3"></div></div>

<nav class="navbar">
  <div class="nav-inner">
    <a class="nav-logo" href="./"><div class="logo-glow">⚡</div><span>Script<span class="acc">Drop</span></span></a>
  </div>
</nav>

<main class="auth-main">
  <div class="auth-card animate-scale">
    <div class="auth-icon-wrap"><div class="auth-icon"><i class="fas fa-bolt"></i></div></div>
    <h2 class="auth-title">Bem-vindo de volta</h2>
    <p class="auth-sub">Entre para postar e gerenciar seus scripts</p>
    <div class="fg">
      <label><i class="fas fa-user"></i> Usuário</label>
      <input type="text" id="username" placeholder="Seu usuário" autocomplete="off"/>
    </div>
    <div class="fg">
      <label><i class="fas fa-lock"></i> Senha</label>
      <div class="input-eye">
        <input type="password" id="password" placeholder="Sua senha" onkeydown="if(event.key==='Enter')login()"/>
        <button class="eye-btn" onclick="togglePass('password',this)"><i class="fas fa-eye"></i></button>
      </div>
    </div>
    <p id="error" class="err-msg"></p>
    <button class="btn-auth" onclick="login()"><i class="fas fa-sign-in-alt"></i> Entrar</button>
    <p class="auth-switch">Não tem conta? <a href="register">Criar conta grátis →</a></p>
  </div>
</main>

<script src="app.js"></script>
</body>
</html>
